<!DOCTYPE html>
<html>
<head>

    <title>悬停翻转的导航栏</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        *{
    /* 初始化 */
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body{
    /* 100%窗口高度 */
    min-height: 100vh;
    /* 弹性布局 水平+垂直居中 */
    justify-content: center;
    align-items: center;
}
.container{
    /* 弹性布局 允许换行 水平居中 */
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.box{
    width: 350px;
    margin: 10px;
    text-align: center;
    /* 相对定位 */
    position: relative;
    /* 开启3D效果 */
    transform-style: preserve-3d;
    /* 设置视距 */
    perspective: 3000px;
}
.box .front{
    background-color: #FFD700;
    width: 100%;
    height: 220px;
    /* 弹性布局 垂直排列 垂直居中 */
    display: flex;
    flex-direction: column;
    justify-content: center;
    /* 阴影 */
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    /* 设置过渡 */
    transition: 0.5s ease;
}
.box .front .icon{
    height: 80px;
}
.box .front .icon i,
.box .front span{
    /* 渐变背景 */
    background: linear-gradient(220deg,#02dbb0,#007adf);
    /* 以区块内的文字作为裁剪区域向外裁剪，文字的背景即为区块的背景，文字之外的区域都将被裁剪掉 */
    -webkit-background-clip: text;
    /* 将文字透明镂空 */
    -webkit-text-fill-color: transparent;
}
.box .front .icon i{
    font-size: 65px;
    font-weight: 900;
}
.box .front span,
.box .back span{
    font-size: 22px;
    font-weight: 600;
    /* 大写 */
    text-transform: uppercase;
}
.box .back{
    /* 绝对定位 */
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    width: 100%;
    height: 220px;
    background: linear-gradient(220deg,#02dbb0,#007adf);
    padding: 30px;
    color: #fff;
    /* 默认不透明度为0 */
    opacity: 0;
    /* 默认位置下移并沿Y轴旋转-90度 */
    transform: translateY(110px) rotateX(-90deg);
    /* 设置过渡 */
    transition: 0.5s ease;
}
.box .back p{
    margin-top: 12px;
    /* 文本两端对齐 */
    text-align: justify;
    line-height: 23px;
}
/* 鼠标移入卡片，两个面做出相应的变化 */
.box:hover .front{
    opacity: 0;
    transform: translateY(-110px) rotateX(90deg);
}
.box:hover .back{
    opacity: 1;
    transform: translateY(0) rotateX(0);
}
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="front">
                <div class="icon">
                    <i class="fa fa-address-card" aria-hidden="true"></i>
                </div>
                <span>私人空间</span>
            </div>
            <div class="back">
                <span>道林李氏</span>
                <p>湖南宁乡李氏家族小站。☘️</p>
            </div>
        </div>
    </div>
</body>
</html>

<style>
.calendar {
  width: 300px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgb(0 0 0 / 10%);
  overflow: hidden;
  transition: box-shadow 0.3s ease;
}
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: linear-gradient(135deg, #1296DC, #87CEEB);
  color: #fff;
  transition: background 0.3s ease;
}
.calendar-header span {
  cursor: pointer;
  transition: transform 0.3s ease;
}
.calendar-header span:hover {
  background: #87CEEB20;
}
.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  padding: 10px;
}
.days div {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid #ddd;
  border-radius: 50%;
  cursor: pointer;
  transition: background-color 0.3s, transform 0.3s;
}
#calendar-days div:not(:empty):hover {
  background: #87CEEB20;
  cursor: pointer;
}
.today {
  background: #87CEEB !important;
  color: white !important;
  font-weight: bold;
}
</style>
<body>
    <div class="container body">
        <div class="row">
            <div class="col-md-8">
                <div class="aside-box">
                    <div class="calendar">
                        <div class="calendar-header">
                            <span id="prev-month">←</span>
                            <div class="month-year" id="month-year"></div>
                            <span id="next-month">→</span>
                        </div>
                        <div class="days">
                            <div>日</div>
                            <div>一</div>
                            <div>二</div>
                            <div>三</div>
                            <div>四</div>
                            <div>五</div>
                            <div>六</div>
                        </div>
                        <div class="days" id="calendar-days"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>


<script>
        function go(url) {
            window.location.href = url;
        }
        const calendarDays = document.getElementById("calendar-days");
        const monthYear = document.getElementById("month-year");
        const prevMonth = document.getElementById("prev-month");
        const nextMonth = document.getElementById("next-month");

        let currentDate = new Date();

        function renderCalendar(year, month) {
            const firstDay = new Date(year, month).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const date = new Date(year, month, 1);
            const today = new Date();
            const todayDate = today.getDate();
            const todayMonth = today.getMonth();
            const todayYear = today.getFullYear();

            calendarDays.innerHTML = "";
            for (let i = 0; i < firstDay; i++) {
                const dayDiv = document.createElement("div");
                calendarDays.appendChild(dayDiv);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement("div");
                dayDiv.textContent = i;
                if (i === todayDate && month === todayMonth && year === todayYear) {
                    dayDiv.classList.add("today");
                }
                calendarDays.appendChild(dayDiv);
            }

            monthYear.textContent = `${year}年${month + 1}月`;
        }

        renderCalendar(currentDate.getFullYear(), currentDate.getMonth());

        prevMonth.addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar(currentDate.getFullYear(), currentDate.getMonth());
        });

        nextMonth.addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar(currentDate.getFullYear(), currentDate.getMonth());
        });

        calendarDays.addEventListener("click", (e) => {
            if (e.target.tagName === "DIV") {
                const selectedDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), e.target.textContent);
                const selectedDayDivs = document.querySelectorAll("#calendar-days div");
                selectedDayDivs.forEach((div) => div.classList.remove("selected"));
                e.target.classList.add("selected");
                console.log(`Selected date: ${selectedDate.toDateString()}`);
            }
        });
</script>
